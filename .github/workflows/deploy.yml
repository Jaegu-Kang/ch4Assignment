name: Java CI/CD with AWS ECR and EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 소스 코드
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 빌드 권한 부여
        run: chmod +x gradlew

      - name: Gradle 빌드 및 테스트 수행 (CI)
        run: ./gradlew build

  deploy-to-ec2:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 소스 코드
        uses: actions/checkout@v4

      - name: AWS 자격 증명 설정 (IAM 인증)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: AWS ECR 로그인 토큰 획득
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # [중요] ARM64 교차 컴파일을 위한 QEMU 가상화 에뮬레이터 추가
      - name: QEMU 가상화 에뮬레이터 설정
        uses: docker/setup-qemu-action@v3

      - name: Docker 빌드 환경 설정 (Buildx)
        uses: docker/setup-buildx-action@v3

      - name: Docker 이미지 빌드 및 AWS ECR Push (CD)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # [핵심 교정] EC2 아키텍처 호환성을 위해 amd64와 arm64 멀티 플랫폼 빌드를 지정합니다.
          platforms: linux/amd64, linux/arm64
          tags: ${{ steps.login-ecr.outputs.registry }}/ch4-assignment:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Appleboy SSH 명령어를 통해 EC2에 배포 실행
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY
          script: |
            echo "1. AWS ECR 자격 증명 갱신 (EC2 내부 로그인)"
            aws ecr get-login-password --region ap-northeast-2 | sudo docker login --username AWS --password-stdin $ECR_REGISTRY
            
            echo "2. 기존 실행 중인 도커 컨테이너 검사 및 제거"
            if [ "$(sudo docker ps -aq -f name=ch4-app)" ]; then
                sudo docker stop ch4-app
                sudo docker rm ch4-app
            fi
            
            echo "3. AWS ECR로부터 최신 컨테이너 이미지 가져오기 (Pull)"
            sudo docker pull $ECR_REGISTRY/ch4-assignment:latest
            
            echo "4. 새 컨테이너 백그라운드 구동 (8080 포트 바인딩)"
            sudo docker run -d --name ch4-app -p 8080:8080 $ECR_REGISTRY/ch4-assignment:latest
            
            echo "5. 불필요한 구버전 이미지 정리"
            sudo docker image prune -f