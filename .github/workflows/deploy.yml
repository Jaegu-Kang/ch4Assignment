name: Java CI/CD with Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew bootJar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ch4-assignment:latest

      - name: Deploy to Amazon Linux 2023 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 기존 구동 중인 컨테이너가 있다면 안전하게 정리
            sudo docker stop ch4-app || true
            sudo docker rm ch4-app || true
            
            # 도커 허브로부터 최신 이미지 가져오기
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ch4-assignment:latest
            
            # 컨테이너 실행 (8080 포트 포워딩 및 백그라운드 구동)
            sudo docker run -d --name ch4-app -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/ch4-assignment:latest
            
            # 사용하지 않는 구버전 이미지 삭제
            sudo docker image prune -f