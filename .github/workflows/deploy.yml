name: Java CI/CD with AWS ECR and EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 소스 코드
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 빌드 권한 부여
        run: chmod +x gradlew

      - name: Gradle 빌드 및 테스트 수행 (CI)
        run: ./gradlew build

  deploy-to-ec2:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 소스 코드
        uses: actions/checkout@v4

      - name: AWS 자격 증명 설정 (IAM 인증)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: AWS ECR 로그인 토큰 획득
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # [중요] ARM64 교차 컴파일을 위한 QEMU 가상화 에뮬레이터 추가
      - name: QEMU 가상화 에뮬레이터 설정
        uses: docker/setup-qemu-action@v3

      - name: Docker 빌드 환경 설정 (Buildx)
        uses: docker/setup-buildx-action@v3

      - name: Docker 이미지 빌드 및 AWS ECR Push (CD)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # [핵심 교정] EC2 아키텍처 호환성을 위해 amd64와 arm64 멀티 플랫폼 빌드를 지정합니다.
          platforms: linux/amd64, linux/arm64
          tags: ${{ steps.login-ecr.outputs.registry }}/ch4-assignment:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =========================================================================
      # [최종 교정 순서 1번] 수동 appleboy SSH 플러그인을 완벽히 들어내고 정석 ASG 오케스트레이션 문을 주입합니다.
      # =========================================================================
      - name: AWS Auto Scaling Group 인스턴스 새로 고침 트리거 및 가용성 무인 자동 검증
        run: |
          echo "▶ 1. AWS CLI를 통해 오토 스케일링 그룹 새로 고침 신호 전사"
          # 상위 서비스 도메인을 'autoscaling' 정석 규격으로 정조준하여 배포 명령을 발송합니다.
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ch4-asg \
            --query 'InstanceRefreshId' \
            --output text)
          
          echo "▷ 배포 트래킹 ID 발급 완료: $REFRESH_ID"
          echo "▶ 2. 신형 자원 무인 세대교체 및 대상 그룹 초록불(Healthy) 상태 실시간 추적 시작"
          
          while true; do
            # 30초마다 AWS 백본망을 폴링 찌르며 롤링 업데이트의 진행 컨디션을 분석합니다.
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name ch4-asg \
              --instance-refresh-ids $REFRESH_ID \
              --query 'InstanceRefreshes[0].Status' \
              --output text)
          
            echo "⏰ 현재 AWS 인프라 자동 교체 및 대상 그룹 가용성 상태: [$STATUS]"
          
            # 최종 안착 성공 판정 시 루프를 완전히 파괴하고 파이프라인을 성공으로 마감합니다.
            if [ "$STATUS" = "Successful" ]; then
              echo "🏆 [배포 자동 검증 완료] 모든 구형 좀비 자원 숙청 완료 및 신형 자원 초록불(Healthy) 점등 성공!"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "🚨 [배포 자동 검증 실패] AWS 인프라 새로 고침 중 최소 정상 백분율 충돌 또는 가용성 결함 발생."
              exit 1
            fi
          
            sleep 30
          done