name: Java CI/CD with AWS ECR and EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 소스 코드
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 빌드 권한 부여
        run: chmod +x gradlew

      - name: Gradle 빌드 및 테스트 수행 (CI)
        run: ./gradlew build

  deploy-to-ec2:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 소스 코드
        uses: actions/checkout@v4

      - name: AWS 자격 증명 설정 (IAM 인증)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: AWS ECR 로그인 토큰 획득
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # [중요] ARM64 교차 컴파일을 위한 QEMU 가상화 에뮬레이터 추가
      - name: QEMU 가상화 에뮬레이터 설정
        uses: docker/setup-qemu-action@v3

      - name: Docker 빌드 환경 설정 (Buildx)
        uses: docker/setup-buildx-action@v3

      - name: Docker 이미지 빌드 및 AWS ECR Push (CD)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # [핵심 교정] EC2 아키텍처 호환성을 위해 amd64와 arm64 멀티 플랫폼 빌드를 지정합니다.
          platforms: linux/amd64, linux/arm64
          tags: ${{ steps.login-ecr.outputs.registry }}/ch4-assignment:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =========================================================================
      # [최종 교정 순서 1번] 5분짜리 강제 대기 족쇄를 파괴하는 --preferences '{"InstanceWarmup": 0}' 옵션을 정석 주입합니다.
      # =========================================================================
      - name: AWS Auto Scaling Group 인스턴스 새로 고침 트리거 및 가용성 무인 자동 검증
        run: |
          echo "▶ 1. AWS CLI를 통해 오토 스케일링 그룹 새로 고침 신호 전사 (웜업 0초 해제 옵션 탑재)"
          # preferences 옵션을 추가하여, 새 컴퓨터의 가용성이 확보되는 순간 지체 없이 다음 교체 주기를 밟도록 유도합니다.
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ch4-asg \
            --preferences '{"InstanceWarmup": 0}' \
            --query 'InstanceRefreshId' \
            --output text)
          
          echo "▷ 배포 트래킹 ID 발급 완료: $REFRESH_ID"
          echo "▶ 2. 신형 자원 무인 세대교체 및 대상 그룹 초록불(Healthy) 상태 실시간 추적 시작"
          
          while true; do
            # 30초마다 AWS 백본망 상태를 안전하게 폴링 조회합니다.
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name ch4-asg \
              --instance-refresh-ids $REFRESH_ID \
              --query 'InstanceRefreshes[0].Status' \
              --output text)
          
            echo "⏰ 현재 AWS 인프라 자동 교체 및 대상 그룹 가용성 상태: [$STATUS]"
          
            # 최종 성공 마크 확인 즉시 빌드 러너를 성공 종료 처리합니다.
            if [ "$STATUS" = "Successful" ]; then
              echo "🏆 [배포 자동 검증 완료] 모든 구형 좀비 자원 숙청 완료 및 신형 자원 초록불(Healthy) 점등 성공!"
              break
            elif [ "$STATUS" = "Failed" ] ||